<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键天气查询</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#36CFC9',
                        light: '#F5F7FA',
                        dark: '#1D2129',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-xl-big { font-size: clamp(1.8rem, 5vw, 2.5rem); }
            .text-lg-big { font-size: clamp(1.2rem, 3vw, 1.8rem); }
            .text-md-big { font-size: clamp(1rem, 2vw, 1.4rem); }
            .btn-hover { @apply hover:scale-105 hover:shadow-lg transition-all duration-300 active:scale-95; }
            .progress-animate { @apply transition-all duration-500 ease-in-out; }
            .card-shadow { @apply shadow-lg shadow-primary/20; }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-light to-white flex flex-col items-center justify-center p-4 text-dark">
    <div class="w-full max-w-md bg-white rounded-2xl p-8 card-shadow">
        <div class="text-center mb-8">
            <i class="fa-solid fa-cloud-sun text-primary text-5xl mb-4"></i>
            <h1 class="text-xl-big font-bold text-primary">一键天气查询</h1>
            <p class="text-md-big text-gray-500 mt-2">当前位置：陕西省 西安市 长安区</p>
        </div>

        <div id="progressContainer" class="hidden w-full h-3 bg-gray-200 rounded-full overflow-hidden mb-6">
            <div id="progressBar" class="progress-animate h-full w-0 bg-primary rounded-full"></div>
        </div>

        <div id="resultBox" class="hidden text-center mt-6 mb-8">
            <p id="resultText" class="text-xl-big font-bold text-secondary"></p>
        </div>

        <button id="queryBtn" class="w-full bg-primary text-white text-lg-big py-4 rounded-xl btn-hover flex items-center justify-center gap-2">
            <i class="fa-solid fa-magnifying-glass"></i>
            立即查询天气
        </button>
    </div>

    <script>
        const queryBtn = document.getElementById('queryBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const resultBox = document.getElementById('resultBox');
        const resultText = document.getElementById('resultText');

        queryBtn.addEventListener('click', async () => {
            queryBtn.disabled = true;
            queryBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
            queryBtn.classList.remove('bg-primary', 'btn-hover');
            queryBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 查询中...';
            progressContainer.classList.remove('hidden');
            resultBox.classList.add('hidden');
            progressBar.style.width = '0';
            await delay(500);
            progressBar.style.width = '11%';
            await delay(1000);
            progressBar.style.width = '20%';
            await delay(800);
            progressBar.style.width = '31%';
            await delay(800);
            progressBar.style.width = '45%';
            await delay(600);
            progressBar.style.width = '70%';
            await delay(800);
            progressBar.style.width = '80%';
            await delay(1000);
            progressBar.style.width = '90%';
            await delay(700);
            progressBar.style.width = '100%';
            await delay(500);
            resultBox.classList.remove('hidden');
            resultText.innerText = '请看看窗外，嘻嘻';
            queryBtn.disabled = false;
            queryBtn.classList.remove('bg-gray-400', 'cursor-not-allowed');
            queryBtn.classList.add('bg-primary', 'btn-hover');
            queryBtn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> 重新查询';
        });

        function delay(ms) {return new Promise(resolve => setTimeout(resolve, ms));}
    </script>
    <p class="mt-8 text-md-big text-gray-400 text-center">
        <i class="fa-solid fa-smile-wink"></i> 人机专用的天气查询工具 
    </p>
</body>
</html>
